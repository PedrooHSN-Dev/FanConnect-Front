<div class="flex h-screen bg-[#f8f9fa] font-sans overflow-hidden">

  <aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full z-20 shadow-sm">
    
    <div class="p-8 flex justify-center items-center h-28">
      <img src="logo-fanconnect.png" alt="FanConnect" class="w-full max-w-[160px] object-contain">
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-4">
      
      <a routerLink="/feed" routerLinkActive="text-[#ff7315] font-bold" class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-gray-500 font-semibold hover:bg-gray-50 transition-colors cursor-pointer">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h6v6H4zm10 0h6v6h-6zM4 14h6v6H4zm10 0h6v6h-6z"/></svg>
        Feed
      </a>

      <a routerLink="/agenda" routerLinkActive="text-[#ff7315] font-bold" class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-gray-500 font-semibold hover:bg-gray-50 transition-colors cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        Agenda
      </a>

      <a class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-gray-500 font-semibold hover:bg-gray-50 transition-colors cursor-pointer">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Conversas
      </a>

      <a routerLink="/perfil" routerLinkActive="text-[#ff7315] font-bold" class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-gray-500 font-semibold hover:bg-gray-50 transition-colors cursor-pointer">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        Meu Perfil
      </a>

    </nav>

    <div class="p-4 mb-4">
      <a class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-gray-500 font-semibold hover:bg-gray-50 transition-colors cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Configurações
      </a>
      <a (click)="sair()" class="flex items-center gap-4 px-6 py-3.5 rounded-2xl text-red-500 font-semibold hover:bg-red-50 transition-colors cursor-pointer mt-2">
        Sair
      </a>
    </div>
  </aside>

  <div class="flex-1 flex flex-col ml-64 min-h-screen">
    
    <header class="h-24 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 sticky top-0 z-10">
      
      <div class="relative w-full max-w-md">
        <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" placeholder="Universitários, Professores, Turmas..." class="w-full bg-gray-50 rounded-full py-3 pl-12 pr-4 outline-none text-sm font-medium text-gray-700 focus:ring-2 focus:ring-[#2861d6]/20 transition-all">
      </div>

      <div class="flex items-center gap-6">
        <button class="text-[#ff7315] hover:text-[#e0610d] transition-colors relative">
          <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </button>

        <button class="text-[#ff7315] hover:text-[#e0610d] transition-colors relative">
          <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>

        <div class="h-8 w-px bg-gray-200 mx-2"></div>

        <div class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 p-2 rounded-xl transition-colors">
          <span class="font-bold text-gray-800 text-sm">{{ nomeUsuario }}</span>
          <img [src]="gerarAvatar(nomeUsuario)" alt="Avatar" class="w-10 h-10 rounded-full border border-gray-200 object-cover">
        </div>
      </div>
    </header>

    <main class="flex-1 p-10 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
