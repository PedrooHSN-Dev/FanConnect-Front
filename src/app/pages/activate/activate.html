<div class="min-h-screen w-full flex bg-[#2861d6]">
  
  <div class="hidden md:flex flex-1 flex-col items-center justify-center">
    <img src="logo-fanconnect.png" alt="Logo FanConnect" class="w-[85%] max-w-[600px] h-auto object-contain">
  </div>

  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl text-center">
      <h2 class="text-4xl font-extrabold text-[#1c2e7a] mb-4">Ativar Conta</h2>
      <p class="text-gray-500 mb-8 font-medium">Insira o código de 6 dígitos enviado para o seu e-mail para liberar o seu acesso à plataforma.</p>

      <form (ngSubmit)="confirmarAtivacao()">
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-800 mb-3 text-left">Código de Verificação</label>
          <div class="flex items-center bg-gray-100 rounded-full px-5 py-4">
            <input type="text" name="codigo" [(ngModel)]="codigo" maxlength="6" placeholder="000000" class="bg-transparent w-full outline-none text-black text-center font-bold text-2xl tracking-[0.3em] placeholder-gray-400/50 pl-[0.3em]">
          </div>
        </div>

        @if (mensagemErro) {
          <div class="mb-4 text-sm text-red-600 bg-red-50 p-3 rounded-full text-center font-semibold border border-red-200">
            {{ mensagemErro }}
          </div>
        }

        <button type="submit" (click)="confirmarAtivacao()" class="w-full bg-[#ff7315] hover:bg-[#e0610d] text-white rounded-full py-4 font-bold text-lg transition-colors shadow-md mb-6">
          Ativar Minha Conta
        </button>

        <div class="text-center">
          <p class="text-sm text-gray-600">
            Deseja retornar? 
            <a (click)="irParaLogin()" class="text-[#1c2e7a] font-bold hover:underline cursor-pointer ml-1">
              Voltar para o Login
            </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
