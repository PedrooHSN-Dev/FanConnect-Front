<div class="min-h-screen w-full flex bg-[#2861d6]">
  <div class="hidden md:flex flex-1 flex-col items-center justify-center">
    <img src="logo-fanconnect.png" alt="Logo FanConnect" class="w-[85%] max-w-[600px] h-auto object-contain">
  </div>

  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl text-center">
      <h2 class="text-4xl font-extrabold text-[#1c2e7a] mb-4">Esqueceu a Senha?</h2>
      <p class="text-gray-500 mb-8 font-medium">Insira o e-mail associado à sua conta. Se ele existir na nossa base de dados, enviaremos um código de recuperação.</p>

      <form (ngSubmit)="solicitar()">
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-800 mb-2 text-left">E-mail</label>
          <div class="flex items-center bg-gray-100 rounded-full px-5 py-3">
            <input type="email" name="email" [(ngModel)]="email" placeholder="seu@email.com" class="bg-transparent w-full outline-none text-black">
          </div>
        </div>

        @if (mensagemErro) {
          <div class="mb-4 text-sm text-red-600 bg-red-50 p-3 rounded-full text-center font-semibold border border-red-200">
            {{ mensagemErro }}
          </div>
        }

        <button type="submit" (click)="solicitar()" class="w-full bg-[#ff7315] hover:bg-[#e0610d] text-white rounded-full py-4 font-bold text-lg transition-colors shadow-md mb-6">
          Enviar Código
        </button>

        <div class="text-center">
          <a (click)="irParaLogin()" class="text-[#1c2e7a] font-bold hover:underline cursor-pointer text-sm">
            Voltar para o Login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
