<div *ngIf="toast" 
     class="fixed bottom-5 right-5 z-[9999] flex items-center w-full max-w-xs p-4 space-x-3 text-gray-700 bg-white rounded-lg shadow-lg border-l-4 transition-all duration-300 ease-in-out"
     [ngClass]="{
       'border-green-500': toast.type === 'success',
       'border-red-500': toast.type === 'error',
       'border-blue-500': toast.type === 'info',
       'border-yellow-500': toast.type === 'warning'
     }"
     role="alert">
  
  <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg"
       [ngClass]="{
         'text-green-500 bg-green-100': toast.type === 'success',
         'text-red-500 bg-red-100': toast.type === 'error',
         'text-blue-500 bg-blue-100': toast.type === 'info',
         'text-yellow-500 bg-yellow-100': toast.type === 'warning'
       }">
    
    <svg *ngIf="toast.type === 'success'" class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
      <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
    </svg>

    <svg *ngIf="toast.type === 'error'" class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
      <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>
    </svg>
    
    <svg *ngIf="toast.type === 'info' || toast.type === 'warning'" class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
      <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z"/>
    </svg>
  </div>

  <div class="ms-3 text-sm font-medium break-words w-full">
    {{ toast.message }}
  </div>

  <button type="button" (click)="fechar()" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8">
    <span class="sr-only">Fechar</span>
    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
    </svg>
  </button>
</div>
